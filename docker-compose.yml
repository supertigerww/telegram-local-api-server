name: telegram-local-bot-api-server

services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_LOCAL: ${TELEGRAM_LOCAL-1}
      TELEGRAM_STAT: ${TELEGRAM_STAT-1}
      TELEGRAM_MAX_WEBHOOK_CONNECTIONS: ${TELEGRAM_MAX_WEBHOOK_CONNECTIONS:-100}
      TELEGRAM_HTTP_PORT: ${TELEGRAM_HTTP_PORT:-8081}
    volumes:
      - ${TELEGRAM_DATA_DIR:-./data}:/var/lib/telegram-bot-api
      - ${TELEGRAM_FILES_DIR:-./files}:/srv/telegram-local-files
    ports:
      # Safe default: only expose the API on the NAS itself.
      # Other containers on the shared Docker network should use
      # http://telegram-bot-api:8081 instead of the host port.
      # If you need LAN access later, replace 127.0.0.1 with a trusted LAN IP
      # or 0.0.0.0 only when you also have firewall / reverse-proxy controls.
      - "127.0.0.1:${TELEGRAM_HTTP_PORT:-8081}:${TELEGRAM_HTTP_PORT:-8081}"
    healthcheck:
      # Uses the stats endpoint enabled by TELEGRAM_STAT=1.
      # If you remove TELEGRAM_STAT from .env, update or remove this healthcheck.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8082/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - telegram-bot-api-net

networks:
  telegram-bot-api-net:
    name: telegram-bot-api-net
